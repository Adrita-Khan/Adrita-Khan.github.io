      g.gain.setValueAtTime(g.gain.value,c.currentTime);
      g.gain.linearRampToValueAtTime(0,c.currentTime+0.8);
      setTimeout(function(){if(bGain===g)bGain=null;},1000);
    }
  }
  function bellUi(on){
    var b=document.getElementById('bell-btn');
    if(!b)return;
    if(on){b.classList.add('hz-playing');b.title='Carillon playing — click to stop';}
    else{b.classList.remove('hz-playing');b.title='Carillon';}
  }
  document.addEventListener('DOMContentLoaded',function(){
    var b=document.getElementById('bell-btn');
    if(b)b.addEventListener('click',function(){
      if(bPlaying){stopBell();}
      else{if(window._hz528Playing&&window._hz528Playing())window._hz528Stop&&window._hz528Stop();if(window._chimePlaying&&window._chimePlaying())window._chimeStop&&window._chimeStop();startBell();}
    });
  });
  window._bellStop=stopBell;
  window._bellPlaying=function(){return bPlaying;};
})();
</script>
<script>
(function(){
  var cctx=null,cGain=null,cPlaying=false,cTimer=null;
  var notes=[392,440,523.25,587.33,659.25,783.99];
  function cac(){if(!cctx)cctx=new(window.AudioContext||window.webkitAudioContext)();return cctx;}
  function chimeStrike(){
    var c=cac();
    if(!cGain)return;
    var now=c.currentTime;
    var n=notes[Math.floor(Math.random()*notes.length)];
    var ps=[{f:n,a:0.35,decay:3.0},{f:n*2.756,a:0.07,decay:1.2}];
    ps.forEach(function(p){
      var osc=c.createOscillator(),env=c.createGain();
      osc.type='sine';
      osc.frequency.setValueAtTime(p.f,now);
      env.gain.setValueAtTime(0.001,now);
      env.gain.linearRampToValueAtTime(p.a*1.5,now+0.002);
      env.gain.exponentialRampToValueAtTime(0.001,now+p.decay);
      osc.connect(env);env.connect(cGain);
      osc.start(now);osc.stop(now+p.decay+0.1);
    });
  }
  function scheduleChimes(){
    chimeStrike();
    cTimer=setTimeout(function(){if(cPlaying)scheduleChimes();},800+Math.random()*2200);
  }
  function startChime(){
    var c=cac();
    if(c.state==='suspended')c.resume();
    cGain=c.createGain();
    cGain.gain.setValueAtTime(0.0,c.currentTime);
    cGain.gain.linearRampToValueAtTime(1.0,c.currentTime+0.3);
    cGain.connect(c.destination);
    cPlaying=true;chimeUi(true);
    scheduleChimes();
  }
  function stopChime(){
    cPlaying=false;chimeUi(false);
    if(cTimer){clearTimeout(cTimer);cTimer=null;}
    if(cGain){
      var c=cac(),g=cGain;
      g.gain.setValueAtTime(g.gain.value,c.currentTime);
      g.gain.linearRampToValueAtTime(0,c.currentTime+0.5);
      setTimeout(function(){if(cGain===g)cGain=null;},700);
    }
  }
  function chimeUi(on){
    var b=document.getElementById('chime-btn');
    if(!b)return;
    if(on){b.classList.add('hz-playing');b.title='Wind Chime playing — click to stop';}
    else{b.classList.remove('hz-playing');b.title='Wind Chime';}
  }
  document.addEventListener('DOMContentLoaded',function(){
    var b=document.getElementById('chime-btn');
    if(b)b.addEventListener('click',function(){
      if(cPlaying){stopChime();}
      else{
        if(window._hz528Playing&&window._hz528Playing())window._hz528Stop&&window._hz528Stop();
        if(window._bellPlaying&&window._bellPlaying())window._bellStop&&window._bellStop();
        startChime();
      }
    });
  });
  window._chimeStop=stopChime;
  window._chimePlaying=function(){return cPlaying;};
})();
</script>
