<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Adrita Khan</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='6'%20fill='%230a0e14'/%3E%3Ctext%20x='16'%20y='22'%20text-anchor='middle'%20font-family='Georgia,serif'%20font-size='18'%20font-weight='700'%20fill='%23c9a961'%3EA%3C/text%3E%3C/svg%3E">
    <script>(function(){var t=sessionStorage.getItem('ak-theme-set')?sessionStorage.getItem('ak-theme'):'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e14 0%, #0f1923 50%, #152232 100%);
            color: #b8c5d0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        [data-theme="light"] body {
            background: linear-gradient(135deg, #f0e6e4 0%, #e8d8d5 50%, #dccac6 100%);
            color: #3d2820;
        }
        .wrap { max-width: 560px; }
        .code {
            font-family: 'Georgia', serif;
            font-size: clamp(5rem, 18vw, 9rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #c9a961, #d4b56d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 1rem;
        }
        [data-theme="light"] h1 { color: #1e1410; }
        p {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0.85;
        }
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.8rem 1.8rem;
            background: linear-gradient(135deg, #c9a961, #d4b56d);
            color: #0f1923;
            text-decoration: none;
            font-weight: 600;
            border-radius: 28px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-size: 0.95rem;
        }
        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(201, 169, 97, 0.4);
        }
        .home-btn::after { content: '→'; transition: transform 0.3s ease; }
        .home-btn:hover::after { transform: translateX(4px); }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="code">404</div>
        <h1>This page slipped past the event horizon.</h1>
        <p>The page you're looking for doesn't exist or has moved. Let's get you back to familiar territory.</p>
        <a href="/" class="home-btn">Return Home</a>
    </div>
</body>
</html>
